<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>

    <link rel="stylesheet" href="../estilos/estilos.css">
    <link rel="stylesheet" href="../public/bootstrap/css/bootstrap.min.css">
</head>

<body>
    <div>
        <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
            <div class="container">

                <!-- Logo a la izquierda -->
                <a class="navbar-brand" href="#">SDWEB</a>

                <!-- Botón responsive -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Menú a la derecha -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="../index.html"><ion-icon
                                    name="home-sharp"></ion-icon>Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../Nosotros/index.html"><ion-icon
                                    name="clipboard-sharp"></ion-icon>Nosotros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../Servicios/index.html"><ion-icon
                                    name="alarm-sharp"></ion-icon>Servicios</a>
                        </li>
                    </ul>
                </div>

            </div>
        </nav>

        <div class="container mt-5">
            <h2 class="text-center mb-4">Contáctanos para recibir más información</h2>

            <form class="mx-auto" style="max-width: 500px;">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" placeholder="Ingresa tu nombre">
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" placeholder="Ingresa tu correo">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensaje</label>
                    <textarea class="form-control" rows="4" placeholder="Escribe tu mensaje"></textarea>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">Enviar</button>
                </div>

            </form>
        </div>

    </div>
    <script type="module" src=" https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js "></script>
    <script nomodule src=" https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js "></script>
</body>

</html>
